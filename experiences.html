<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | BanastaoHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .navbar { background: rgba(0, 31, 63, 0.9); }
        .gallery-container { margin-top: 100px; padding-bottom: 50px; }
        
        /* CSS3 FEATURE: Image Hover & Rounded Corners */
        .img-card {
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            height: 250px;
        }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        .img-card:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        footer { background: #001f3f; color: white; padding: 40px 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">BanastaoHub</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown">Experiences</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="experiences.html">Gallery</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container gallery-container">
    <h2 class="text-center mb-5 fw-bold">Experience Gallery</h2>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#pop1">
                <img src="plane.jpg" alt="Planes">
            </div>
        </div>
        <div class="col-md-4">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#pop2">
                <img src="shooting.jpg" alt="Workshops">
            </div>
        </div>
        <div class="col-md-4">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#pop3">
                <img src="Community.jpg" alt="Community">
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="pop1"><div class="modal-dialog modal-lg"><div class="modal-content"><img src="plane.jpg"></div></div></div>
<div class="modal fade" id="pop2"><div class="modal-dialog modal-lg"><div class="modal-content"><img src="shooting.jpg"></div></div></div>
<div class="modal fade" id="pop3"><div class="modal-dialog modal-lg"><div class="modal-content"><img src="Community.jpg"></div></div></div>

<footer class="text-center">
    <div class="container">
        <p>Developer: Jethro T. Banastao | BSIT - BM14 | 2025-2026</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
